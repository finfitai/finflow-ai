<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, sans-serif">
  <!-- Background -->
  <rect width="800" height="500" fill="#0B0F14"/>

  <!-- Sidebar -->
  <rect width="180" height="500" fill="#121821"/>

  <!-- Logo area -->
  <rect x="16" y="16" width="148" height="32" rx="6" fill="#19202a"/>
  <text x="30" y="37" fill="#FFFFFF" font-size="16" font-weight="700" font-family="Outfit">debbit</text>

  <!-- Nav items -->
  <rect x="20" y="81" width="10" height="10" rx="2" fill="#6B7280"/>
  <text x="38" y="91" fill="#6B7280" font-size="12">Overview</text>

  <rect x="20" y="121" width="10" height="10" rx="2" fill="#6B7280"/>
  <text x="38" y="131" fill="#6B7280" font-size="12">Cash Flow</text>

  <rect x="20" y="161" width="10" height="10" rx="2" fill="#6B7280"/>
  <text x="38" y="171" fill="#6B7280" font-size="12">Invoices</text>

  <rect x="12" y="190" width="156" height="32" rx="6" fill="#ED9CB1" opacity="0.15"/>
  <rect x="20" y="201" width="10" height="10" rx="2" fill="#ED9CB1"/>
  <text x="38" y="211" fill="#ED9CB1" font-size="12">AI CFO</text>

  <rect x="20" y="241" width="10" height="10" rx="2" fill="#6B7280"/>
  <text x="38" y="251" fill="#6B7280" font-size="12">Inventory</text>

  <!-- Main Content: AI CFO Chat -->
  <text x="200" y="40" fill="#FFFFFF" font-size="20" font-weight="700">AI CFO Assistant</text>
  <text x="200" y="58" fill="#ED9CB1" font-size="11">Powered by debbit Intelligence</text>

  <!-- Chat container -->
  <rect x="196" y="70" width="440" height="380" rx="10" fill="#121821" stroke="rgba(237,156,177,0.15)" stroke-width="1"/>

  <!-- Chat messages -->
  <!-- User message -->
  <rect x="320" y="88" width="296" height="36" rx="8" fill="#9D4EDD" opacity="0.3"/>
  <text x="334" y="104" fill="#FFFFFF" font-size="10">Why did my margins drop this week?</text>
  <text x="334" y="118" fill="#9CA3AF" font-size="8">You · 10:24 AM</text>

  <!-- AI response 1 -->
  <rect x="212" y="135" width="296" height="62" rx="8" fill="#19202a"/>
  <text x="226" y="152" fill="#ED9CB1" font-size="9" font-weight="600">AI CFO</text>
  <text x="226" y="167" fill="#FFFFFF" font-size="10">Your gross margin dropped 12% vs last</text>
  <text x="226" y="180" fill="#FFFFFF" font-size="10">week. Primary driver: Coffee Bean cost</text>
  <text x="226" y="193" fill="#FFFFFF" font-size="10">rose +RM4.50/kg (Batch #CB-0039).</text>

  <!-- User message 2 -->
  <rect x="320" y="210" width="296" height="36" rx="8" fill="#9D4EDD" opacity="0.3"/>
  <text x="334" y="226" fill="#FFFFFF" font-size="10">What should I do about it?</text>
  <text x="334" y="240" fill="#9CA3AF" font-size="8">You · 10:25 AM</text>

  <!-- AI response 2 -->
  <rect x="212" y="257" width="296" height="80" rx="8" fill="#19202a"/>
  <text x="226" y="274" fill="#ED9CB1" font-size="9" font-weight="600">AI CFO</text>
  <text x="226" y="289" fill="#FFFFFF" font-size="10">3 recommended actions:</text>
  <text x="226" y="304" fill="#9CA3AF" font-size="10">① Raise Latte price by +RM0.50</text>
  <text x="226" y="317" fill="#9CA3AF" font-size="10">② Use Milk Batch #802 before expiry</text>
  <text x="226" y="330" fill="#9CA3AF" font-size="10">③ Renegotiate supplier rate (save ~RM180)</text>

  <!-- User message 3 -->
  <rect x="320" y="350" width="296" height="36" rx="8" fill="#9D4EDD" opacity="0.3"/>
  <text x="334" y="366" fill="#FFFFFF" font-size="10">Am I LHDN compliant this month?</text>
  <text x="334" y="380" fill="#9CA3AF" font-size="8">You · 10:26 AM</text>

  <!-- AI response 3 - typing indicator -->
  <rect x="212" y="398" width="100" height="30" rx="8" fill="#19202a"/>
  <circle cx="235" cy="413" r="4" fill="#ED9CB1" opacity="0.4"/>
  <circle cx="250" cy="413" r="4" fill="#ED9CB1" opacity="0.6"/>
  <circle cx="265" cy="413" r="4" fill="#ED9CB1" opacity="0.9"/>

  <!-- Chat input -->
  <rect x="196" y="458" width="440" height="32" rx="8" fill="#19202a" stroke="rgba(157,78,221,0.4)" stroke-width="1"/>
  <text x="212" y="478" fill="#4B5563" font-size="10">Ask your AI CFO anything...</text>
  <rect x="612" y="462" width="18" height="24" rx="4" fill="#9D4EDD" opacity="0.8"/>
  <text x="617" y="478" fill="#FFFFFF" font-size="11">↑</text>

  <!-- Right panel: Quick Metrics -->
  <rect x="650" y="70" width="128" height="380" rx="10" fill="#121821" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <text x="664" y="92" fill="#FFFFFF" font-size="11" font-weight="600">Quick Stats</text>

  <!-- Metric items -->
  <rect x="660" y="102" width="108" height="50" rx="6" fill="#19202a"/>
  <text x="670" y="119" fill="#9CA3AF" font-size="9">Gross Margin</text>
  <text x="670" y="137" fill="#EF4444" font-size="16" font-weight="700">34.3%</text>
  <text x="670" y="148" fill="#EF4444" font-size="8">↓ 12% vs last wk</text>

  <rect x="660" y="160" width="108" height="50" rx="6" fill="#19202a"/>
  <text x="670" y="177" fill="#9CA3AF" font-size="9">Revenue Today</text>
  <text x="670" y="195" fill="#FFFFFF" font-size="14" font-weight="700">RM 2,840</text>
  <text x="670" y="206" fill="#10B981" font-size="8">↑ 8% vs yesterday</text>

  <rect x="660" y="218" width="108" height="50" rx="6" fill="#19202a"/>
  <text x="670" y="235" fill="#9CA3AF" font-size="9">Top Seller</text>
  <text x="670" y="253" fill="#9D4EDD" font-size="12" font-weight="700">Caffe Latte</text>
  <text x="670" y="264" fill="#9CA3AF" font-size="8">48 sold today</text>

  <rect x="660" y="276" width="108" height="50" rx="6" fill="#19202a"/>
  <text x="670" y="293" fill="#9CA3AF" font-size="9">LHDN Status</text>
  <text x="670" y="311" fill="#10B981" font-size="13" font-weight="700">Compliant</text>
  <text x="670" y="322" fill="#10B981" font-size="8">May 2026 ✓</text>

  <rect x="660" y="334" width="108" height="50" rx="6" fill="#19202a"/>
  <text x="670" y="351" fill="#9CA3AF" font-size="9">Cash Runway</text>
  <text x="670" y="369" fill="#FFFFFF" font-size="14" font-weight="700">42 days</text>
  <text x="670" y="380" fill="#F59E0B" font-size="8">Based on burn rate</text>

  <!-- Pulse dot on AI CFO -->
  <circle cx="190" cy="206" r="4" fill="#ED9CB1" opacity="0.9"/>
  <circle cx="190" cy="206" r="7" fill="#ED9CB1" opacity="0.2"/>
</svg>
