  <text x="290" y="415" fill="#6B7280" font-size="9">Description</text>
  <text x="480" y="415" fill="#6B7280" font-size="9">Category</text>
  <text x="580" y="415" fill="#6B7280" font-size="9" text-anchor="end">Amount</text>
  <line x1="208" y1="419" x2="772" y2="419" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

