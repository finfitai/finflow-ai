  <text x="212" y="467" fill="#9CA3AF" font-size="10">28 May</text>
  <text x="290" y="467" fill="#FFFFFF" font-size="10">Invoice #INV-0042 Paid</text>
  <text x="480" y="467" fill="#9CA3AF" font-size="10">Invoice</text>
  <text x="580" y="467" fill="#10B981" font-size="10" text-anchor="end">+RM 1,250.00</text>
