  <line x1="230" y1="240" x2="610" y2="240" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="230" y1="260" x2="610" y2="260" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="230" y1="280" x2="610" y2="280" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="230" y1="300" x2="610" y2="300" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="230" y1="340" x2="610" y2="340" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

