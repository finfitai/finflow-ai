  <text x="368" y="358" fill="#6B7280" font-size="9">Feb</text>
  <text x="428" y="358" fill="#6B7280" font-size="9">Mar</text>
  <text x="488" y="358" fill="#6B7280" font-size="9">Apr</text>
  <text x="548" y="358" fill="#6B7280" font-size="9">May</text>
